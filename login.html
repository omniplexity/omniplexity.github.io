<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAI Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell auth-shell">
    <div class="auth-card">
        <div class="brand">
            <div class="glyph">AI</div>
            <div>
                <p class="eyebrow">omniplexity - experimental</p>
                <h1>Sign in</h1>
                <p class="muted small">Access your OmniAI workspace.</p>
            </div>
        </div>
        <form id="loginForm" class="auth-form">
            <label class="sr-only" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com" required>
            <label class="sr-only" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" id="loginBtn">Sign in</button>
            <p class="muted small" id="loginStatus"></p>
        </form>
    </div>
</div>
<script>
const defaultBackendURL = "https://rossie-chargeful-plentifully.ngrok-free.dev/api/chat";
const statusEl = document.getElementById("loginStatus");
const form = document.getElementById("loginForm");
const emailEl = document.getElementById("loginEmail");
const passEl = document.getElementById("loginPassword");
const btn = document.getElementById("loginBtn");

const normalizeBackendUrl = (candidate) => {
    let normalized = candidate.trim();
    if (!/^https?:\/\//i.test(normalized)) normalized = `https://${normalized}`;
    const url = new URL(normalized);
    url.pathname = "/api/auth/login";
    url.search = "";
    return url.toString();
};

let backendURL = "";

// Force the default backend URL into localStorage so the chat page aligns.
try {
    backendURL = normalizeBackendUrl(defaultBackendURL);
    localStorage.setItem("backendURL", backendURL);
} catch {
    statusEl.textContent = "Invalid backend URL configured.";
}

// Quick connectivity check with a status indicator (green = ok, red = bad)
const checkBackendStatus = async () => {
    const indicator = document.createElement("span");
    indicator.style.display = "inline-block";
    indicator.style.marginLeft = "8px";
    indicator.style.width = "10px";
    indicator.style.height = "10px";
    indicator.style.borderRadius = "50%";
    indicator.style.verticalAlign = "middle";
    indicator.style.background = "#c1121f"; // red default
    statusEl.prepend(indicator);

    if (!backendURL) {
        statusEl.textContent = "Backend URL missing";
        indicator.style.background = "#c1121f";
        return;
    }
    try {
        const res = await fetch(backendURL.replace(/\/api\/chat\/?$/, "/"), { method: "GET", credentials: "include" });
        if (res.ok) {
            indicator.style.background = "#16a34a"; // green
            statusEl.textContent = "Backend reachable";
        } else {
            indicator.style.background = "#c1121f";
            statusEl.textContent = `Backend error ${res.status}`;
        }
    } catch (err) {
        indicator.style.background = "#c1121f";
        statusEl.textContent = "Backend unreachable";
    }
};

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!backendURL) {
        statusEl.textContent = "Set a valid backend URL first.";
        return;
    }
    btn.disabled = true;
    statusEl.textContent = "Signing in...";
    try {
        const res = await fetch(backendURL, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailEl.value.trim(), password: passEl.value })
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.detail || `Login failed (${res.status})`);
        }
        statusEl.textContent = "Success. Redirecting...";
        setTimeout(() => { window.location.href = "./index.html"; }, 400);
    } catch (err) {
        statusEl.textContent = err.message;
    } finally {
        btn.disabled = false;
    }
});

// Run initial backend check
checkBackendStatus();
</script>
</body>
</html>
