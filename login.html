<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAI Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
    <script src="utils.js"></script>
</head>
<body>
<div class="background-grid"></div>
<div class="shell auth-shell">
    <div class="auth-card">
        <div class="brand">
            <div class="glyph">AI</div>
            <div>
                <p class="eyebrow">omniplexity - experimental</p>
                <h1>Sign in</h1>
                <p class="muted small">Access your OmniAI workspace.</p>
            </div>
        </div>
        <div class="backend-config">
            <label for="backendUrlInput">Backend URL</label>
            <div class="backend-row">
                <input type="text" id="backendUrlInput" placeholder="https://your-backend.example.com/api/chat">
                <button type="button" id="saveBackendBtn" class="ghost">Save</button>
            </div>
            <p class="muted small" id="backendStatus">No backend configured.</p>
        </div>
        <form id="loginForm" class="auth-form">
            <label class="sr-only" for="loginEmail">Username or email</label>
            <input type="text" id="loginEmail" placeholder="username or email" autocomplete="username" required>
            <label class="sr-only" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" id="loginBtn">Sign in</button>
            <p class="muted small" id="loginStatus"></p>
        </form>
    </div>
</div>
<script>
const statusEl = document.getElementById("loginStatus");
const form = document.getElementById("loginForm");
const emailEl = document.getElementById("loginEmail");
const passEl = document.getElementById("loginPassword");
const btn = document.getElementById("loginBtn");
const backendUrlInput = document.getElementById("backendUrlInput");
const saveBackendBtn = document.getElementById("saveBackendBtn");
const backendStatusEl = document.getElementById("backendStatus");
const utils = window.OmniUtils;
const ngrokHeaders = utils ? utils.NGROK_HEADERS : { "ngrok-skip-browser-warning": "true" };
const backendConfig = utils ? utils.getBackendConfig() : window.BackendConfig;

let chatURL = "";
let loginURL = "";
let healthURL = "";
let authMeURL = "";
const LAST_LOGIN_KEY = "omniLastLoginTs";
const redirectToApp = () => {
    const target = `./index.html?ts=${Date.now()}`;
    window.location.replace(target);
    setTimeout(() => { window.location.href = target; }, 500); // fallback for aggressive caches
};

const setBackendUrls = (chatUrl) => {
    chatURL = chatUrl || "";
    loginURL = chatURL ? chatURL.replace(/\/api\/chat\/?$/, "/api/auth/login") : "";
    healthURL = chatURL ? chatURL.replace(/\/api\/chat\/?$/, "/") : "";
    authMeURL = chatURL ? chatURL.replace(/\/api\/chat\/?$/, "/api/auth/me") : "";
    if (backendUrlInput) backendUrlInput.value = chatURL;
    if (backendStatusEl) backendStatusEl.textContent = chatURL || "No backend configured.";
};

const initializeBackend = () => {
    if (!backendConfig && !utils) {
        statusEl.textContent = "Backend config missing.";
        return;
    }
    const chatUrl = utils ? utils.getStoredBackendUrl() : backendConfig.getStoredBackendUrl();
    if (!chatUrl) {
        statusEl.textContent = "Set a valid backend URL to continue.";
        return;
    }
    setBackendUrls(chatUrl);
};

const applyBackendUrl = () => {
    if (!backendConfig && !utils) return;
    try {
        const updated = utils
            ? utils.setStoredBackendUrl(backendUrlInput.value)
            : backendConfig.setStoredBackendUrl(backendUrlInput.value);
        setBackendUrls(updated);
        statusEl.textContent = "Backend updated.";
        checkBackendStatus();
        checkExistingSession();
    } catch (err) {
        statusEl.textContent = err.message || "Invalid backend URL.";
    }
};

// If a valid session already exists, go straight to the app.
const checkExistingSession = async () => {
    if (!authMeURL) return;
    try {
        const res = await fetch(authMeURL, { method: "GET", credentials: "include", headers: ngrokHeaders });
        if (res.ok) {
            statusEl.textContent = "Session active. Redirecting...";
            redirectToApp();
        }
    } catch (err) {
        console.warn("Session check on login page failed", err);
    }
};

// Quick connectivity check with a status indicator (green = ok, red = bad)
const checkBackendStatus = async () => {
    const indicator = document.createElement("span");
    indicator.style.display = "inline-block";
    indicator.style.marginLeft = "8px";
    indicator.style.width = "10px";
    indicator.style.height = "10px";
    indicator.style.borderRadius = "50%";
    indicator.style.verticalAlign = "middle";
    indicator.style.background = "#c1121f"; // red default
    statusEl.prepend(indicator);

    if (!healthURL) {
        statusEl.textContent = "Backend URL missing";
        indicator.style.background = "#c1121f";
        return;
    }
    try {
        const res = await fetch(healthURL, { method: "GET", credentials: "omit", headers: ngrokHeaders });
        // Treat non-5xx and opaque as reachable to avoid CORS false negatives
        if (res.type === "opaque" || res.status === 0 || res.status < 500) {
            indicator.style.background = "#16a34a"; // green
            statusEl.textContent = res.status === 401 ? "Backend reachable (login required)" : "Backend reachable";
        } else {
            indicator.style.background = "#c1121f";
            statusEl.textContent = `Backend error ${res.status}`;
        }
    } catch (err) {
        indicator.style.background = "#c1121f";
        statusEl.textContent = "Backend unreachable";
    }
};

form.addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!loginURL) {
        statusEl.textContent = "Set a valid backend URL first.";
        return;
    }
    btn.disabled = true;
    statusEl.textContent = "Signing in...";
    try {
        const res = await fetch(loginURL, {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json", ...ngrokHeaders },
            body: JSON.stringify({ email: emailEl.value.trim(), password: passEl.value })
        });
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            const reqId = data?.request_id ? ` (req ${data.request_id})` : "";
            throw new Error((data.detail || `Login failed (${res.status})`) + reqId);
        }
        statusEl.textContent = "Success. Verifying session...";
        // Verify the cookie stuck; if it didn't, tell the user why.
        if (authMeURL) {
            try {
                const me = await fetch(authMeURL, { method: "GET", credentials: "include", headers: ngrokHeaders });
                if (!me.ok) {
                    throw new Error("Session not established. Please allow cookies for this site.");
                }
            } catch (errCheck) {
                // If CORS blocks reading the response but login likely succeeded, continue to app.
                console.warn("Session check failed, proceeding anyway:", errCheck);
                statusEl.textContent = "Session check blocked by browser. Redirecting...";
            }
        }
        statusEl.textContent = "Success. Redirecting...";
        try {
            localStorage.setItem(LAST_LOGIN_KEY, String(Date.now()));
        } catch {
            // ignore storage failures
        }
        redirectToApp();
    } catch (err) {
        statusEl.textContent = err.message;
    } finally {
        btn.disabled = false;
    }
});

// Run initial backend check
initializeBackend();
checkBackendStatus();
checkExistingSession();

if (saveBackendBtn) {
    saveBackendBtn.addEventListener("click", applyBackendUrl);
}

if (backendUrlInput) {
    backendUrlInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            e.preventDefault();
            applyBackendUrl();
        }
    });
}
</script>
</body>
</html>
