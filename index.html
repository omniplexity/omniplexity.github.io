<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniAI</title>
    <link rel="stylesheet" href="style.css">
    <script>
        // Pre-flight auth check: set backend URL and force login unless /api/auth/me succeeds.
        (function () {
            const resolveDefaultBackendUrl = () => {
                const host = window.location.hostname;
                if (host && host.endsWith("github.io")) {
                    return "https://rossie-chargeful-plentifully.ngrok-free.dev/api/chat";
                }
                if (host === "localhost" || host === "127.0.0.1") {
                    return `http://${host}:8000/api/chat`;
                }
                return "https://rossie-chargeful-plentifully.ngrok-free.dev/api/chat";
            };

            const DEFAULT_CHAT_URL = resolveDefaultBackendUrl();
            const NGROK_HEADERS = { "ngrok-skip-browser-warning": "true" };

            const normalizeChatUrl = (candidate) => {
                if (!candidate) return "";
                let normalized = candidate.trim();
                if (!/^https?:\/\//i.test(normalized)) normalized = `https://${normalized}`;
                const url = new URL(normalized);
                if (!/\/api\/chat\/?$/.test(url.pathname)) url.pathname = "/api/chat";
                url.search = "";
                return url.toString();
            };

            const stored = localStorage.getItem("backendURL");
            const chatUrl = normalizeChatUrl(stored || DEFAULT_CHAT_URL);
            if (chatUrl) {
                localStorage.setItem("backendURL", chatUrl);
            } else {
                // Stay on the page and let chat.js surface a clear error instead of looping redirects.
                console.warn("No backend URL resolved; staying on page.");
                return;
            }

            try {
                const authUrl = new URL(chatUrl);
                authUrl.pathname = "/api/auth/me";
                authUrl.search = "";
                fetch(authUrl.toString(), { credentials: "include", headers: NGROK_HEADERS })
                    .then((res) => {
                        // Do not redirect here; let chat.js surface auth status and avoid loops.
                        if (res.status !== 200) {
                            console.warn("Auth precheck non-OK; continuing", res.status);
                            window.authPrecheckWarning = res.status;
                        } else {
                            window.authPrecheckWarning = "ok";
                        }
                    })
                    .catch((err) => {
                        console.warn("Auth precheck failed; continuing", err);
                        window.authPrecheckWarning = "error";
                    });
            } catch {
                // If URL parsing fails, let chat.js handle errors.
            }
        })();
    </script>
</head>
<body>

<div class="shell">
    <header class="masthead">
        <div class="brand">
            <div class="glyph">AI</div>
            <div>
                <p class="eyebrow">omniplexity - experimental</p>
                <h1>OmniAI Chat</h1>
            </div>
        </div>
        <div class="masthead-right">
            <div class="status" id="statusBadge">
                <span class="dot"></span>
                <span id="statusText">Checking backend...</span>
            </div>
            <div class="hub" id="hubWrapper">
                <button type="button" id="settingsToggle" class="icon-btn" aria-label="Open hub">Hub</button>
            </div>
            <button type="button" id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">Dark</button>
            <button type="button" id="logoutBtn" class="theme-toggle ghost" aria-label="Log out">Log out</button>
        </div>
    </header>

    <section class="control-panel" id="controlPanel" aria-hidden="true">
        <div class="panel-header">
            <div>
                <p class="eyebrow">Control hub</p>
                <h3>Session settings</h3>
                <p class="muted small">Adjust model, guidance, search, and theme.</p>
            </div>
            <div class="panel-actions">
                <button type="button" id="closeHubBtn" class="icon-btn small" aria-label="Close hub">X</button>
            </div>
        </div>
        <div class="tab-bar">
            <button type="button" class="tab-btn active" data-tab="model">Models</button>
            <button type="button" class="tab-btn" data-tab="gen">Generation</button>
            <button type="button" class="tab-btn" data-tab="theme">Theme</button>
            <button type="button" class="tab-btn admin-tab" data-tab="admin" hidden>Admin</button>
        </div>
        <div class="control-row tab-panel" data-tab-panel="model">
            <div class="control-group">
                <label for="modelSelect">Model</label>
                <select id="modelSelect">
                    <option value="">Default (env)</option>
                </select>
            </div>
            <div class="control-group">
                <label for="systemPrompt">System prompt</label>
                <textarea id="systemPrompt" rows="2" placeholder="You are a helpful assistant..."></textarea>
            </div>
            <div class="control-group">
                <label for="activeStatus">Current settings</label>
                <div id="activeStatus" class="pill wide">Default model - temp 0.7 - top_p 1.0 - max 512</div>
            </div>
            <div class="control-group">
                <button type="button" id="reloadModelsBtn" class="theme-apply ghost">Reload models</button>
            </div>
        </div>
        <div class="control-row sliders tab-panel" data-tab-panel="gen" hidden>
            <div class="slider-group">
                <label for="tempSlider">Temperature <span id="tempValue">0.7</span></label>
                <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7">
            </div>
            <div class="slider-group">
                <label for="topPSlider">Top P <span id="topPValue">1.0</span></label>
                <input type="range" id="topPSlider" min="0" max="1" step="0.05" value="1.0">
            </div>
            <div class="slider-group">
                <label for="maxTokensInput">Max tokens</label>
                <input type="number" id="maxTokensInput" min="16" max="4096" step="16" value="512">
            </div>
            <div class="slider-group checkbox-group">
                <label><input type="checkbox" id="useSearchToggle"> Use web search</label>
            </div>
        </div>
        <div class="control-row theme-custom tab-panel" data-tab-panel="theme" hidden>
            <div class="control-group">
                <label>Gradient start</label>
                <div class="color-pair">
                    <input type="color" id="gradStartPicker" value="#0b84ff">
                    <input type="text" id="gradStartHex" value="#0b84ff" spellcheck="false">
                </div>
            </div>
            <div class="control-group">
                <label>Gradient end</label>
                <div class="color-pair">
                    <input type="color" id="gradEndPicker" value="#0c9eff">
                    <input type="text" id="gradEndHex" value="#0c9eff" spellcheck="false">
                </div>
            </div>
            <div class="slider-group">
                <label for="gradAngle">Gradient angle <span id="gradAngleValue">140 deg</span></label>
                <input type="range" id="gradAngle" min="0" max="360" step="5" value="140">
            </div>
            <div class="control-group apply-group">
                <button type="button" id="applyThemeBtn" class="theme-apply">Apply theme</button>
                <button type="button" id="resetThemeBtn" class="theme-apply ghost">Reset default</button>
            </div>
        </div>
        <div class="control-row theme-custom">
            <div class="control-group">
                <label for="themePreset">Theme preset</label>
                <select id="themePreset">
                    <option value="">Pick a preset</option>
                    <option value="aurora">Aurora</option>
                    <option value="sunrise">Sunrise</option>
                    <option value="midnight">Midnight</option>
                    <option value="forest">Forest</option>
                    <option value="ocean">Ocean</option>
                    <option value="citrus">Citrus</option>
                </select>
            </div>
        </div>
        <div class="control-row admin-panel tab-panel" data-tab-panel="admin" hidden>
            <div class="control-group">
                <label>Users</label>
                <div id="usersList" class="pill wide muted">Loading...</div>
            </div>
            <div class="control-group">
                <label for="newUserEmail">Add user (admin only)</label>
                <input type="email" id="newUserEmail" placeholder="email@example.com">
            </div>
            <div class="control-group">
                <label for="newUserPassword">Temp password</label>
                <input type="password" id="newUserPassword" placeholder="Temp password">
            </div>
            <div class="control-group checkbox-group">
                <label><input type="checkbox" id="newUserIsAdmin"> Make admin</label>
            </div>
            <div class="control-group apply-group">
                <button type="button" id="createUserBtn" class="theme-apply">Create user</button>
            </div>
        </div>
    </section>

    <div class="backdrop" id="hubBackdrop" aria-hidden="true"></div>

    <div id="toast" class="toast" aria-live="polite" aria-atomic="true"></div>

    <div class="session-status" id="sessionStatus">Default model - temp 0.7 - top_p 1.0 - max 512</div>

    <main class="chat-panel">
        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="composer" class="composer">
            <label class="sr-only" for="prompt">Message</label>
            <textarea
                id="prompt"
                name="prompt"
                rows="2"
                placeholder="Send a note to your model..."
                autocomplete="off"
            ></textarea>
            <div class="composer__actions">
                <span class="hint">Shift + Enter for newline | Ctrl/Cmd + Enter to send</span>
                <button type="button" id="clearChatBtn" class="ghost">Clear</button>
                <button id="sendBtn" type="submit">Send</button>
            </div>
        </form>
    </main>
</div>

<script src="chat.js"></script>
</body>
</html>
